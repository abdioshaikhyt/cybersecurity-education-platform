project_name: Visualise Your Data Security

project_description: |
  VYDS: Visualising Your Data Security
  Empowering users through education, clarity, and digital confidence.

  VYDS simplifies complex digital policies with an analysis tool
  that helps users understand their rights and data risks.

  Targeted educational articles and interactive quizzes
  address common online activities and threats,
  making data security engaging and accessible.

  By bridging the gap between policy and everyday awareness,
  VYDS equips users to protect themselves online.

  Supports SDG 4 (Quality Education)
  and SDG 9 (Industry, Innovation, and Infrastructure)

